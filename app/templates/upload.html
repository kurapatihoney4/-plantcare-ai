<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
<input
    type="file"
    name="images"
    multiple
    accept="image/*"
    required>

    <button type="submit">Upload & Predict</button>
</form>

<!-- 👇 ADD THIS BELOW THE FORM -->
{% if result %}
    <h3>Result:</h3>
    <p>{{ result }}</p>
{% endif %}
